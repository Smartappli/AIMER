[project]
name = "aimer-workspace"
version = "0.1.0"
requires-python = ">=3.12"

dependencies = []

[tool.uv]
# Limit dependency resolution to Linux/Python 3.13 so workspace locking doesn't
# fail on unsupported split environments (e.g. macOS + Python 3.14).
environments = []

[tool.uv.workspace]
members = [
  "AIMER-ROOT",
  "MAGE",
  "FARM",
]

[tool.pytest.ini_options]
markers = [
  "slow: marks tests as slow (deselect with '-m \"not slow\"')",
]
