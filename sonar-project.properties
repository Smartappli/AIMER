sonar.projectKey=Smartappli_AIMER
sonar.organization=smartappli-github

# This is the name and version displayed in the SonarCloud UI.
#sonar.projectName=AIMER
#sonar.projectVersion=1.0


# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
sonar.sources=services,docs,infra

# Encoding of the source code. Default is default system encoding
sonar.sourceEncoding=UTF-8

sonar.exclusions=**/.venv/**,**/__pycache__/**,**/.pytest_cache/**,**/.ruff_cache/**,infra/dev-stack/**,**/migrations/**,**/static/vendor/**,**/static/js/**,**/templates/layout/partials/menu/**,**/RAG/data/pdfs/**,**/RAG/data/figures/**,**/RAG/data/markdown/**,**/RAG/data/tables/**,**/tests/**,**/test_*.py,**/*_tests.py
sonar.coverage.exclusions=**/__init__.py,**/settings.py,**/asgi.py,**/urls.py,**/admin.py,**/apps.py,**/manage.py,**/info.py,**/templates/**,**/static/**,**/migrations/**,**/tests/**,**/test_*.py,**/*_tests.py,**/RAG/scripts/**,**/RAG/agent.py,**/RAG/main.py,**/RAG/query.py,**/RAG/verify_openrag.py

# OpenRAG transitively locks ibm-cos-sdk 2.16.2, which has no Python 3.13 wheel.
# Keep the build locked and restrict this exception to the RAG-dependent images.
sonar.issue.ignore.multicriteria=e1,e2
sonar.issue.ignore.multicriteria.e1.ruleKey=docker:S8541
sonar.issue.ignore.multicriteria.e1.resourceKey=services/aimer-web/Dockerfile
sonar.issue.ignore.multicriteria.e2.ruleKey=docker:S8541
