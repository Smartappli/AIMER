{% load static %}
<!-- Helpers -->
<!--! Template customizer & Theme config files MUST be included after core stylesheets and helpers.js in the <head> section -->
<script src="{% static 'vendor/js/helpers.js' %}"></script>
<!--? Template customizer: To hide customizer set display_customizer value false in config.js.  -->
{% if has_customizer %}
    <script src="{% static 'vendor/js/template-customizer.js' %}"></script>
{% endif %}
<!--? Config:  Mandatory theme config file contain global vars & default theme options, Set your preferred theme option in this file.  -->
<script src="{% static 'js/config.js' %}"></script>
<!-- beautify ignore:start -->
{% if has_customizer %}
    <script>
  if (typeof TemplateCustomizer !== 'undefined') {
    window.templateCustomizer = new TemplateCustomizer({
    {% if primary_color %}
      cssPath: '{% static "vendor/css/theme-{COLOR}.css" %}',
      themesPath: '{% static "vendor/css/" %}',
      defaultStyle: "{{color}}",
    {% endif %}
     controls: ['rtl', 'theme', 'color'],
    });
  }
    </script>
{% endif %}
<!-- beautify ignore:end -->
