apiVersion: apps/v1
kind: Deployment
metadata:
  name: aimer-web
  namespace: aimer-prod
  labels:
    app.kubernetes.io/name: aimer-web
    app.kubernetes.io/part-of: aimer
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: aimer-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aimer-web
        app.kubernetes.io/part-of: aimer
    spec:
      serviceAccountName: aimer-web
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: aimer-web
          image: docker.io/smartappli/aimer:prod-placeholder
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: aimer-prod-config
            - secretRef:
                name: aimer-web-secrets
          env:
            - name: RUN_DJANGO_MIGRATIONS
              value: "0"
            - name: RUN_DJANGO_COLLECTSTATIC
              value: "1"
          livenessProbe:
            httpGet:
              path: /healthz/
              port: http
              httpHeaders:
                - name: X-Forwarded-Proto
                  value: https
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /readyz/
              port: http
              httpHeaders:
                - name: X-Forwarded-Proto
                  value: https
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /app/.cache
            - name: staticfiles
              mountPath: /app/staticfiles
            - name: aimer-rag-ca
              mountPath: /etc/aimer-rag-ca
              readOnly: true
      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
        - name: staticfiles
          emptyDir: {}
        - name: aimer-rag-ca
          secret:
            secretName: aimer-rag-tls
            items:
              - key: ca.crt
                path: ca.crt
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aimer-rag
  namespace: aimer-prod
  labels:
    app.kubernetes.io/name: aimer-rag
    app.kubernetes.io/part-of: aimer
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: aimer-rag
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aimer-rag
        app.kubernetes.io/part-of: aimer
    spec:
      serviceAccountName: aimer-rag
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: aimer-rag
          image: docker.io/smartappli/aimer-rag:prod-placeholder
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: aimer-prod-config
            - secretRef:
                name: aimer-rag-secrets
          env:
            - name: RAG_VERIFY_ON_START
              value: "1"
            - name: GRANIAN_SSL_CERTIFICATE
              value: /etc/aimer-rag-tls/tls.crt
            - name: GRANIAN_SSL_KEYFILE
              value: /etc/aimer-rag-tls/tls.key
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
              scheme: HTTPS
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
              scheme: HTTPS
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /app/.cache
            - name: aimer-rag-tls
              mountPath: /etc/aimer-rag-tls
              readOnly: true
      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
        - name: aimer-rag-tls
          secret:
            secretName: aimer-rag-tls
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mage
  namespace: aimer-prod
  labels:
    app.kubernetes.io/name: mage
    app.kubernetes.io/part-of: aimer
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mage
        app.kubernetes.io/part-of: aimer
    spec:
      serviceAccountName: mage
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mage
          image: docker.io/smartappli/mage-api:prod-placeholder
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 10000
          envFrom:
            - configMapRef:
                name: aimer-prod-config
            - secretRef:
                name: mage-secrets
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: "1"
              memory: 4Gi
            limits:
              cpu: "4"
              memory: 12Gi
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /app/.cache
      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
---
