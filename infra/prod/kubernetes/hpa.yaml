apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aimer-web
  labels:
    app.kubernetes.io/name: aimer-web
    app.kubernetes.io/part-of: aimer
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aimer-web
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
