version: 2

# Keep this file aligned with the manifests that actually exist in the
# repository. Dependabot scans one directory list per ecosystem.
updates:
  # GitHub Actions workflows live in .github/workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule: &weekly_schedule
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "Europe/Brussels"
    labels: &dependency_labels
      - "dependencies"
    commit-message: &dependency_commit_message
      prefix: "deps"
      include: "scope"
    open-pull-requests-limit: 5

  # Python projects are managed with uv lock files.
  - package-ecosystem: "uv"
    directories:
      - "/"
      - "/services/aimer-web"
      - "/services/MAGE"
      - "/services/FARM"
    schedule: *weekly_schedule
    labels: *dependency_labels
    commit-message: *dependency_commit_message
    open-pull-requests-limit: 5

  # pre-commit hook revisions are configured at the repository root.
  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule: *weekly_schedule
    labels: *dependency_labels
    commit-message: *dependency_commit_message
    open-pull-requests-limit: 5

  # One entry for every directory that contains a Dockerfile.
  - package-ecosystem: "docker"
    directories:
      - "/services/aimer-web"
      - "/services/FARM"
      - "/services/MAGE"
      - "/infra/dev-stack/airflow"
      - "/infra/dev-stack/mlflow"
      - "/infra/dev-stack/qdrant"
    schedule: *weekly_schedule
    labels: *dependency_labels
    commit-message: *dependency_commit_message
    open-pull-requests-limit: 5

  # The local integration compose manifest lives under infra/dev-stack.
  - package-ecosystem: "docker-compose"
    directory: "/infra/dev-stack"
    schedule: *weekly_schedule
    labels: *dependency_labels
    commit-message: *dependency_commit_message
    open-pull-requests-limit: 5
