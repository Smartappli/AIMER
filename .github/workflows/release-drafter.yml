name: Release Drafter

on:
  push:
    branches:
      - master

  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:
  contents: read

jobs:
  update_release_draft:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Update draft release (attempt 1)
        id: release_drafter_attempt_1
        continue-on-error: true
        uses: release-drafter/release-drafter@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Update draft release (retry after transient API/network failure)
        if: steps.release_drafter_attempt_1.outcome == 'failure'
        uses: release-drafter/release-drafter@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
