name: Global License Checker

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_call:
  workflow_dispatch:

concurrency:
  group: global-license-check-${{ github.event_name == 'pull_request' && format('{0}-{1}', github.workflow, github.event.pull_request.number) || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  license-check:
    name: License Check (${{ matrix.service }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: aimer-web
            path: services/aimer-web
          - service: MAGE
            path: services/MAGE
          - service: FARM
            path: services/FARM

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Export locked runtime requirements
        working-directory: ${{ matrix.path }}
        run: uv export --locked --no-dev --format requirements-txt --output-file "${RUNNER_TEMP}/${{ matrix.service }}-requirements.txt"

      - name: Check Python licenses
        id: license_check_report
        uses: pilosus/action-pip-license-checker@v3
        with:
          requirements: ${{ runner.temp }}/${{ matrix.service }}-requirements.txt
          fail: NetworkCopyleft
          exclude: (?i)^(pylint|tbb|nvidia|aio[-_]*).*
          verbose: 1
          github-token: ${{ github.token }}

      - name: Save report
        if: ${{ always() }}
        run: printf '%s' '${{ steps.license_check_report.outputs.report }}' > "license-report-${{ matrix.service }}.json"

      - name: Upload artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: license-report-${{ matrix.service }}
          path: license-report-${{ matrix.service }}.json
          if-no-files-found: error
